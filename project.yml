name: Luo
options:
  bundleIdPrefix: com.charliezong
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    # Throwaway tuning harness — keep Swift 5 language mode so the @MainActor /
    # CoreMotion closure hops don't trip Swift 6 strict-concurrency errors.
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"            # iPhone only
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_NSMotionUsageDescription: "落 reads device motion so your shake casts the coin."
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait

targets:
  Luo:
    type: application
    platform: iOS
    sources:
      - path: Luo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charliezong.luo
        # Personal Team (free Apple ID) — signs device builds for sideloading.
        # Simulator builds ignore it. Free-provisioning 7-day expiry applies.
        DEVELOPMENT_TEAM: "Q8XV65MMXK"
        CODE_SIGN_STYLE: Automatic

  LuoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LuoTests
    dependencies:
      - target: Luo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charliezong.luoTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Luo:
    build:
      targets:
        Luo: all
    test:
      targets:
        - LuoTests
