name: Luo
options:
  bundleIdPrefix: com.charliezong
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    # Throwaway tuning harness — keep Swift 5 language mode so the @MainActor /
    # CoreMotion closure hops don't trip Swift 6 strict-concurrency errors.
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"            # iPhone only
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_NSMotionUsageDescription: "落 reads device motion so your shake casts the coin."
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait

targets:
  Luo:
    type: application
    platform: iOS
    sources:
      - path: Luo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charliezong.luo
        # Empty team = builds for Simulator without signing. Set your Apple ID
        # team here (or in Xcode → Signing) before running on a real device.
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
